                                            if (view === 'servir') setServirView(sub.id);
                                        }} className="w-full bg-white border border-slate-100 p-5 rounded-2xl text-left flex items-center gap-4 hover:bg-slate-50 shadow-sm transition-all active:scale-95">
                                            <div className="text-slate-300 shrink-0"><Icon name={sub.icon} /></div>
                                            <div className="flex-1 min-w-0">
                                                <h4 className="font-bold text-slate-800 text-xs uppercase truncate">{sub.title}</h4>
                                                <p className="text-[9px] text-slate-400 uppercase tracking-tighter truncate">{sub.desc}</p>
                                            </div>
                                            <Icon name="chevron-right" className="w-3 h-3 text-slate-200" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* CONTENIDO DETALLADO - NUEVA PANTALLA AL HACER CLIC */}
                        {content && activeSubId && activeSubId !== 'menu' && !selectedItem && !showContentView && (
                            <div className="animate-slide">
                                <button onClick={handleBack} className="flex items-center gap-2 text-slate-400 mb-6 font-bold text-[10px] uppercase tracking-widest">
                                    <Icon name="arrow-left" className="w-4 h-4" /> Volver
                                </button>
                                
                                {/* Título del contenido */}
                                <div className={`p-6 text-white rounded-t-2xl ${content.accent}`}>
                                    <h2 className="text-xl font-serif italic leading-tight">{content.titulo}</h2>
                                </div>
                                
                                {/* Si tiene subMenus (como sintomas), mostrarlos - SI NO, mostrar tabs */}
                                {content.subMenus ? (
                                    <div className="bg-white rounded-b-2xl shadow-xl border border-slate-100 overflow-hidden mb-6">
                                        {content.subMenus.map((sub) => (
                                            <button 
                                                key={sub.id}
                                                onClick={() => {
                                                    setShowContentView(false);
                                                    setActiveTab(null);
                                                    if (view === 'liberacion') setLiberView(sub.id);
                                                    if (view === 'arrepentimiento') setArrepentimientoView(sub.id);
                                                    if (view === 'aguas') setAguasView(sub.id);
                                                    if (view === 'espiritu') setEspirituView(sub.id);
                                                    if (view === 'fuego') setFuegoView(sub.id);
                                                    if (view === 'servir') setServirView(sub.id);
                                                }}
                                                className="w-full p-5 flex items-center justify-between border-b border-slate-50 last:border-b-0 hover:bg-slate-50 transition-all"
                                            >
                                                <span className="font-bold text-xs uppercase tracking-wide text-slate-700">
                                                    {sub.title}
                                                </span>
                                                <Icon name="chevron-right" className="w-4 h-4 text-slate-300" />
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    /* Lista de tabs normal */
                                    <div className="bg-white rounded-b-2xl shadow-xl border border-slate-100 overflow-hidden mb-6">
                                        {Object.keys(content.tabs).map((key, index) => (
                                            <button 
                                                key={key}
                                                onClick={() => {
                                                    // Guardar la pestaña activa y navegar a vista de contenido
                                                    setActiveTab(key);
                                                    setShowContentView(true);
                                                }}
                                                className="w-full p-5 flex items-center justify-between border-b border-slate-50 last:border-b-0 hover:bg-slate-50 transition-all"
                                            >
                                                <span className="font-bold text-xs uppercase tracking-wide text-slate-700">
                                                    {content.tabs[key].label}
                                                </span>
                                                <Icon name="chevron-right" className="w-4 h-4 text-slate-300" />
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* VISTA DE CONTENIDO INDIVIDUAL - NUEVA PANTALLA */}
                        {showContentView && activeContentData && (
                            <div className="animate-slide">
                                <button onClick={() => setShowContentView(false)} className="flex items-center gap-2 text-slate-400 mb-6 font-bold text-[10px] uppercase tracking-widest">
                                    <Icon name="arrow-left" className="w-4 h-4" /> Volver a Temas
                                </button>
                                
                                <div className="bg-white rounded-[2.5rem] p-10 shadow-2xl border border-slate-50 overflow-hidden">
                                    <div className={`p-6 text-white ${activeContentData.accent}`}>
                                        <h2 className="text-xl font-serif italic leading-tight">{activeContentData.titulo}</h2>
                                        <p className="text-xs text-white/70 mt-2 uppercase tracking-wider">{activeContentData.sectionLabel}</p>
                                    </div>
                                    <div className="p-6">
                                        <div className="space-y-4">
                                            {activeContentData.items.map((item, i) => (
                                                <div key={i} className="flex gap-3 items-start">
                                                    <Icon name="check-circle-2" className="w-4 h-4 text-amber-400 mt-0.5 shrink-0" />
                                                    <p className="text-slate-600 text-sm leading-relaxed font-serif">{item}</p>
                                                </div>
                                            ))}
                                        </div>
                                        {activeContentData.biblia && (
                                            <div className="mt-8 p-5 bg-slate-50 rounded-2xl text-center border border-slate-100">
                                                <p className="italic text-slate-500 text-xs">{activeContentData.biblia}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* DETALLE DE SEÑAL INDIVIDUAL */}
                        {selectedItem && (
                            <div className="animate-slide text-center">
                                <button onClick={() => setSelectedItem(null)} className="flex items-center gap-2 text-slate-400 mb-8 font-bold text-[10px] uppercase tracking-widest mx-auto">
                                    <Icon name="arrow-left" className="w-4 h-4" /> Volver a Señales
                                </button>
                                <div className="bg-white rounded-[2.5rem] p-10 shadow-2xl border border-slate-50 overflow-hidden">
                                    <div className="text-amber-500 mb-6 flex justify-center"><Icon name={selectedItem.icon} className="w-12 h-12" /></div>
                                    <h3 className="text-2xl font-serif italic mb-10 text-slate-900">{selectedItem.name}</h3>
                                    <div className="text-left space-y-4 mb-10 border-l-2 border-amber-100 pl-6">
                                        <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest block mb-2">Análisis Espiritual</span>
                                        {selectedItem.raices.map((r, i) => <p key={i} className="text-slate-600 text-sm italic leading-relaxed">• {r}</p>)}
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-3xl italic text-slate-400 text-xs border border-slate-100">"{selectedItem.versiculo}"</div>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* FOOTER DE NAVEGACIÓN */}
                    <footer className="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 p-6 flex justify-around items-center z-50">
                        <button onClick={() => {
                            setView('main'); 
                            setLiberView('menu'); setArrepentimientoView('menu'); setAguasView('menu'); setEspirituView('menu'); setFuegoView('menu'); setServirView('menu');
                            setSelectedItem(null);
                        }} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'main' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
                            <Icon name="shield" />
                            <span className="text-[8px] font-black uppercase tracking-widest">Etapas</span>
                        </button>
                        
                        <button onClick={() => {
                            setView('liberacion'); setLiberView('menu'); setSelectedItem(null);
                        }} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'liberacion' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
                            <Icon name="zap" />
                            <span className="text-[8px] font-black uppercase tracking-widest">Guerra</span>
                        </button>
                        
                        <a href={WHATSAPP_LINK} target="_blank" className="flex flex-col items-center gap-1.5 text-slate-300 hover:text-emerald-500 transition-all">
                            <Icon name="message-circle" />
                            <span className="text-[8px] font-black uppercase tracking-widest">Ayuda</span>
                        </a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
