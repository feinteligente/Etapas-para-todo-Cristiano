                                    </div>
                                    <p className="font-serif text-base italic leading-relaxed text-slate-600">
                                        Un recorrido claro para crecer en la fe, entender cada proceso y conservar el contenido bien organizado.
                                    </p>
                                </div>

                                <div className="max-h-[calc(100vh-18rem)] space-y-2 overflow-y-auto p-4 no-scrollbar">
                                    <button
                                        onClick={resetNavigation}
                                        className={`w-full rounded-2xl border px-4 py-3 text-left transition-all ${view === 'main' && !showContentView && !selectedItem ? 'border-slate-900 bg-slate-900 text-white shadow-soft' : 'border-slate-200 bg-white/80 text-slate-700 hover:border-slate-300 hover:bg-white'}`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className={`flex h-10 w-10 items-center justify-center rounded-xl ${view === 'main' && !showContentView && !selectedItem ? 'bg-white/15 text-white' : 'bg-slate-100 text-slate-700'}`}>
                                                <Icon name="home" className="h-5 w-5" />
                                            </div>
                                            <div>
                                                <p className="text-sm font-bold">Inicio</p>
                                                <p className={`text-xs ${view === 'main' && !showContentView && !selectedItem ? 'text-slate-200' : 'text-slate-500'}`}>Resumen general</p>
                                            </div>
                                        </div>
                                    </button>

                                    {etapas.map((e) => {
                                        const isActiveStage = view === e.id;
                                        return (
                                            <div key={e.id} className="overflow-hidden rounded-2xl border border-slate-200/80 bg-white/80">
                                                <button
                                                    onClick={() => openStage(e.id)}
                                                    className={`w-full px-4 py-4 text-left transition-all ${isActiveStage ? 'bg-slate-950 text-white' : 'hover:bg-slate-50'}`}
                                                >
                                                    <div className="flex items-start gap-3">
                                                        <div className={`mt-0.5 flex h-11 w-11 shrink-0 items-center justify-center rounded-xl ${isActiveStage ? 'bg-white/10 text-white' : 'bg-slate-100 text-slate-700'}`}>
                                                            <Icon name={e.icon} className="h-5 w-5" />
                                                        </div>
                                                        <div className="min-w-0">
                                                            <p className="text-sm font-extrabold leading-tight">{e.title}</p>
                                                            <p className={`mt-1 text-xs leading-relaxed ${isActiveStage ? 'text-slate-200' : 'text-slate-500'}`}>{e.desc}</p>
                                                        </div>
                                                    </div>
                                                </button>

                                                {isActiveStage && currentMenuItems.length > 0 && (
                                                    <div className="border-t border-white/10 bg-white p-2">
                                                        <div className="mb-2 px-2 pt-1 text-[10px] font-black uppercase tracking-[0.24em] text-slate-400">
                                                            Temas y subtemas
                                                        </div>
                                                        <div className="space-y-1">
                                                            {currentMenuItems.map((item) => {
                                                                const isCurrent = activeSubId === item.id && !showContentView && !selectedItem;
                                                                return (
                                                                    <button
                                                                        key={item.id}
                                                                        onClick={() => openSubItem(item.id)}
                                                                        className={`w-full rounded-xl px-3 py-3 text-left transition-all ${isCurrent ? 'bg-amber-50 text-amber-900 ring-1 ring-amber-200' : 'text-slate-700 hover:bg-slate-50'}`}
                                                                    >
                                                                        <div className="flex items-start gap-3">
                                                                            <div className={`mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-lg ${isCurrent ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>
                                                                                <Icon name={item.icon || 'book-open'} className="h-4 w-4" />
                                                                            </div>
                                                                            <div className="min-w-0">
                                                                                <p className="text-xs font-bold uppercase tracking-wide">{item.title}</p>
                                                                                {item.desc && <p className="mt-1 text-xs leading-relaxed text-slate-500">{item.desc}</p>}
                                                                            </div>
                                                                        </div>
                                                                    </button>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="border-t border-slate-200/80 p-4">
                                    <a
                                        href={WHATSAPP_LINK}
                                        target="_blank"
                                        rel="noreferrer"
                                        className="flex items-center justify-center gap-2 rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-bold text-white shadow-soft transition hover:bg-emerald-700"
                                    >
                                        <Icon name="message-circle" className="h-4 w-4" />
                                        Acompañamiento por WhatsApp
                                    </a>
                                </div>
                            </aside>

                            <main className="space-y-6">
                                <section className="glass animate-fade rounded-[2rem] border border-white/70 px-5 py-6 shadow-soft sm:px-8 sm:py-8">
                                    <div className="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
                                        <div className="max-w-3xl">
                                            <div className="mb-3 inline-flex items-center gap-2 rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-[11px] font-extrabold uppercase tracking-[0.24em] text-amber-800">
                                                <Icon name="book-heart" className="h-4 w-4" />
                                                Formación cristiana
                                            </div>
                                            <h2 className="text-3xl font-black leading-tight text-slate-950 sm:text-4xl">
                                                {pageTitle}
                                            </h2>
                                            <p className="mt-4 max-w-2xl font-serif text-lg italic leading-relaxed text-slate-600">
                                                {view === 'main'
                                                    ? 'Cada etapa tiene su importancia. Este material organiza el crecimiento espiritual desde la liberación hasta el servicio, con una lectura más clara tanto en celular como en computadora.'
                                                    : showContentView && activeContentData
                                                        ? 'Estás viendo una sección puntual del contenido. Podés volver al tema anterior cuando quieras y seguir avanzando paso a paso.'
                                                        : selectedItem
                                                            ? 'Detalle de una señal específica para revisar con más claridad su análisis espiritual.'
                                                            : 'Entrá a cada tema, navegá sus subtemas y mantené el contenido ordenado sin perder profundidad.'}
                                            </p>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 sm:flex sm:flex-wrap">
                                            {(view !== 'main' || showContentView || selectedItem) && (
                                                <button
                                                    onClick={handleBack}
                                                    className="inline-flex items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50"
                                                >
                                                    <Icon name="arrow-left" className="h-4 w-4" />
                                                    Volver
                                                </button>
                                            )}
                                            <button
                                                onClick={resetNavigation}
                                                className="inline-flex items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50"
                                            >
                                                <Icon name="layout-grid" className="h-4 w-4" />
                                                Ver etapas
                                            </button>
                                            <a
                                                href={WHATSAPP_LINK}
                                                target="_blank"
                                                rel="noreferrer"
                                                className="inline-flex items-center justify-center gap-2 rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white transition hover:bg-slate-800"
                                            >
                                                <Icon name="message-square-share" className="h-4 w-4" />
                                                Pedir ayuda
                                            </a>
                                        </div>
                                    </div>
                                </section>

                                {view === 'main' && (
                                    <>
                                        <section className="grid gap-4 md:grid-cols-2 xl:grid-cols-3 animate-slide">
                                            {etapas.map((e) => (
                                                <button
                                                    key={e.id}
                                                    onClick={() => openStage(e.id)}
                                                    className="group rounded-[2rem] border border-white/70 bg-white/90 p-6 text-left shadow-soft transition duration-200 hover:-translate-y-1 hover:shadow-card"
                                                >
                                                    <div className="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-100 text-slate-700 transition group-hover:bg-amber-50 group-hover:text-amber-700">
                                                        <Icon name={e.icon} className="h-6 w-6" />
                                                    </div>
                                                    <h3 className="text-lg font-black leading-tight text-slate-900">{e.title}</h3>
                                                    <p className="mt-2 text-sm leading-relaxed text-slate-600">{e.desc}</p>
                                                    <div className="mt-5 inline-flex items-center gap-2 text-xs font-bold uppercase tracking-[0.24em] text-slate-400 group-hover:text-amber-700">
                                                        Explorar
                                                        <Icon name="arrow-right" className="h-4 w-4" />
                                                    </div>
                                                </button>
                                            ))}
                                        </section>

                                        <section className="grid gap-4 xl:grid-cols-[minmax(0,1.25fr)_minmax(0,0.9fr)]">
                                            <article className="rounded-[2rem] border border-white/70 bg-white/90 p-6 shadow-soft sm:p-8">
                                                <p className="mb-3 text-[11px] font-extrabold uppercase tracking-[0.28em] text-slate-400">Introducción</p>
                                                <div className="space-y-4 font-serif text-lg italic leading-relaxed text-slate-600">
                                                    <p>El camino de la fe cristiana es un proceso transformador que nos lleva desde el encuentro inicial con Cristo hasta el servicio pleno en Su reino.</p>
                                                    <p>Estas seis etapas representan los pasos fundamentales que todo creyente debe experimentar para alcanzar la madurez espiritual y cumplir con el propósito divino en su vida.</p>
                                                    <p>Cada etapa prepara al cristiano para la siguiente. Desde la liberación del pecado hasta el servicio activo en la obra de Dios, este recorrido moldea, fortalece y capacita para ser un verdadero discípulo de Cristo.</p>
                                                </div>
                                            </article>

                                            <article className="rounded-[2rem] border border-slate-200 bg-slate-950 p-6 text-white shadow-soft sm:p-8">
                                                <p className="mb-3 text-[11px] font-extrabold uppercase tracking-[0.28em] text-slate-400">Cómo usar esta página</p>
                                                <div className="space-y-4 text-sm leading-relaxed text-slate-200">
                                                    <p>1. Elegí una de las 6 etapas y entrá al tema principal.</p>
                                                    <p>2. Abrí los submenús para navegar mejor el contenido.</p>
                                                    <p>3. Leé cada bloque por partes para conservar el orden.</p>
                                                    <p>4. En celular y en PC ahora vas a ver una estructura más clara, con mejor lectura y navegación.</p>
                                                </div>
                                            </article>
                                        </section>
                                    </>
                                )}

                                {view !== 'main' && !content && !selectedItem && (
                                    <section className="rounded-[2rem] border border-white/70 bg-white/90 p-6 shadow-soft sm:p-8 animate-slide">
                                        <div className="mb-6">
                                            <p className="text-[11px] font-extrabold uppercase tracking-[0.28em] text-slate-400">{currentStageLabel}</p>
                                            <h3 className="mt-2 text-2xl font-black text-slate-950">Elegí un tema para continuar</h3>
                                            <p className="mt-3 max-w-2xl text-sm leading-relaxed text-slate-600">
                                                En esta etapa tenés un menú organizado por subtemas. Podés abrir cualquiera desde la barra lateral o desde las tarjetas de abajo.
                                            </p>
                                        </div>

                                        <div className="grid gap-3 md:grid-cols-2">
                                            {currentMenuItems.map((item) => (
                                                <button
                                                    key={item.id}
                                                    onClick={() => openSubItem(item.id)}
                                                    className="rounded-2xl border border-slate-200 bg-slate-50/70 p-5 text-left transition hover:border-slate-300 hover:bg-white"
                                                >
                                                    <div className="mb-3 flex h-11 w-11 items-center justify-center rounded-xl bg-white text-slate-700 shadow-sm">
                                                        <Icon name={item.icon || 'book-open'} className="h-5 w-5" />
                                                    </div>
                                                    <h4 className="text-sm font-extrabold uppercase tracking-wide text-slate-800">{item.title}</h4>
                                                    {item.desc && <p className="mt-2 text-sm leading-relaxed text-slate-600">{item.desc}</p>}
                                                </button>
                                            ))}
                                        </div>
                                    </section>
                                )}

                                {content && !showContentView && !selectedItem && (
                                    <section className="animate-slide rounded-[2rem] border border-white/70 bg-white/90 shadow-card overflow-hidden">
                                        <div className={`${content.accent} px-6 py-6 text-white sm:px-8`}>
                                            <p className="text-[11px] font-extrabold uppercase tracking-[0.28em] text-white/70">{currentStageLabel}</p>
                                            <h3 className="mt-2 text-2xl font-black sm:text-3xl">{content.titulo}</h3>
                                        </div>

                                        <div className="p-5 sm:p-8">
                                            {content.subMenus ? (
                                                <div className="grid gap-3 md:grid-cols-2">
                                                    {content.subMenus.map((sub) => (
                                                        <button
                                                            key={sub.id}
                                                            onClick={() => openSubItem(sub.id)}
                                                            className="rounded-2xl border border-slate-200 bg-slate-50/70 p-5 text-left transition hover:border-slate-300 hover:bg-white"
                                                        >
                                                            <div className="mb-3 flex items-center justify-between gap-3">
                                                                <div className="flex h-11 w-11 items-center justify-center rounded-xl bg-white text-slate-700 shadow-sm">
                                                                    <Icon name="folder-open" className="h-5 w-5" />
                                                                </div>
                                                                <Icon name="arrow-right" className="h-4 w-4 text-slate-400" />
                                                            </div>
                                                            <p className="text-sm font-extrabold uppercase tracking-wide text-slate-800">{sub.title}</p>
                                                        </button>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="grid gap-3 md:grid-cols-2">
                                                    {Object.keys(content.tabs).map((key) => (
                                                        <button
                                                            key={key}
                                                            onClick={() => {
                                                                setActiveTab(key);
                                                                setShowContentView(true);
                                                                window.scrollTo(0, 0);
                                                            }}
                                                            className="rounded-2xl border border-slate-200 bg-slate-50/70 p-5 text-left transition hover:border-slate-300 hover:bg-white"
                                                        >
                                                            <div className="mb-3 flex items-center justify-between gap-3">
                                                                <div className="flex h-11 w-11 items-center justify-center rounded-xl bg-white text-slate-700 shadow-sm">
                                                                    <Icon name="book-open-text" className="h-5 w-5" />
                                                                </div>
                                                                <Icon name="arrow-right" className="h-4 w-4 text-slate-400" />
                                                            </div>
                                                            <p className="text-sm font-extrabold uppercase tracking-wide text-slate-800">{content.tabs[key].label}</p>
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </section>
                                )}

                                {showContentView && activeContentData && (
                                    <section className="animate-slide overflow-hidden rounded-[2rem] border border-white/70 bg-white/95 shadow-card">
                                        <div className={`${activeContentData.accent} px-6 py-6 text-white sm:px-8`}>
                                            <p className="text-[11px] font-extrabold uppercase tracking-[0.28em] text-white/70">{activeContentData.sectionLabel}</p>
                                            <h3 className="mt-2 text-2xl font-black sm:text-3xl">{activeContentData.titulo}</h3>
                                            {activeContentData.biblia && <p className="mt-3 text-sm text-white/80">{activeContentData.biblia}</p>}
                                        </div>
                                        <div className="content-card p-5 sm:p-8">
                                            <div className="space-y-3">
                                                {activeContentData.items.map((item, i) => (
                                                    item === "" ? <div key={i} className="h-3"></div> : (
                                                        <div key={i} className="flex items-start gap-3 rounded-2xl border border-slate-100 bg-slate-50/60 px-4 py-4">
                                                            <div className="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-amber-100 text-amber-700">
                                                                <Icon name="check-circle-2" className="h-4 w-4" />
                                                            </div>
                                                            <p className="font-serif text-lg leading-relaxed text-slate-700">{item}</p>
                                                        </div>
                                                    )
                                                ))}
                                            </div>
                                        </div>
                                    </section>
                                )}

                                {selectedItem && (
                                    <section className="animate-slide overflow-hidden rounded-[2rem] border border-white/70 bg-white/95 shadow-card">
                                        <div className="bg-slate-950 px-6 py-6 text-white sm:px-8">
                                            <p className="text-[11px] font-extrabold uppercase tracking-[0.28em] text-slate-400">Señal analizada</p>
                                            <div className="mt-3 flex items-center gap-4">
                                                <div className="flex h-16 w-16 items-center justify-center rounded-2xl bg-white/10 text-amber-300">
                                                    <Icon name={selectedItem.icon} className="h-8 w-8" />
                                                </div>
                                                <h3 className="text-2xl font-black sm:text-3xl">{selectedItem.name}</h3>
                                            </div>
                                        </div>
                                        <div className="p-5 sm:p-8">
                                            <div className="rounded-[1.5rem] border border-amber-100 bg-amber-50/70 p-5">
                                                <p className="mb-3 text-[11px] font-extrabold uppercase tracking-[0.28em] text-amber-800">Análisis espiritual</p>
                                                <div className="space-y-3">
                                                    {selectedItem.raices.map((r, i) => (
                                                        <p key={i} className="font-serif text-lg leading-relaxed text-slate-700">• {r}</p>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="mt-5 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-5 text-center">
                                                <p className="text-sm italic text-slate-500">{selectedItem.versiculo}</p>
                                            </div>
                                        </div>
                                    </section>
                                )}
                            </main>
                        </div>
                    </div>

                    <footer className="glass fixed inset-x-0 bottom-0 z-50 border-t border-white/80 px-4 py-3 shadow-soft lg:hidden">
                        <div className="mx-auto flex max-w-md items-center justify-between gap-2">
                            <button
                                onClick={resetNavigation}
                                className={`flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-3 py-2 text-[10px] font-black uppercase tracking-[0.18em] transition ${view === 'main' && !showContentView && !selectedItem ? 'bg-slate-950 text-white' : 'text-slate-500'}`}
                            >
                                <Icon name="layout-grid" className="h-5 w-5" />
                                Etapas
                            </button>

                            <button
                                onClick={() => openStage('liberacion')}
                                className={`flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-3 py-2 text-[10px] font-black uppercase tracking-[0.18em] transition ${view === 'liberacion' ? 'bg-slate-950 text-white' : 'text-slate-500'}`}
                            >
                                <Icon name="shield" className="h-5 w-5" />
                                Guerra
                            </button>

                            <a
                                href={WHATSAPP_LINK}
                                target="_blank"
                                rel="noreferrer"
                                className="flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-3 py-2 text-[10px] font-black uppercase tracking-[0.18em] text-emerald-700"
                            >
                                <Icon name="message-circle" className="h-5 w-5" />
                                Ayuda
                            </a>
                        </div>
                    </footer>
                </div>
            );
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
